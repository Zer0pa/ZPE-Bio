name: CI Python

on:
  push:
    paths:
      - "python/**"
      - "tests/**"
      - "scripts/**"
      - "docs/multimodal/**"
      - "validation/**"
      - "pyproject.toml"
      - "MANIFEST.in"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "python/**"
      - "tests/**"
      - "scripts/**"
      - "docs/multimodal/**"
      - "validation/**"
      - "pyproject.toml"
      - "MANIFEST.in"
      - ".github/workflows/ci-python.yml"

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,validation]"

      - name: Ruff
        run: ruff check python scripts validation

      - name: Verify multimodal manifest
        run: python scripts/verify_multimodal_manifest.py

      - name: Pytest
        run: pytest -q

      - name: Multimodal performance gate
        run: |
          python scripts/benchmark_multimodal.py \
            --iterations 150 \
            --max-smell-ms 5.0 \
            --max-taste-ms 5.0 \
            --max-touch-ms 6.0 \
            --max-mental-ms 6.0 \
            --max-fusion-ms 7.0 \
            --max-peak-kb 2048

      - name: Build sdist and wheel
        run: python -m build

      - name: Install wheel and verify CLI
        run: |
          python -m pip install dist/*.whl
          zpe-bio --help
          zpe-bio multimodal --json

  build-artifacts:
    runs-on: ubuntu-latest
    needs: lint-test-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zpe-bio-dist
          path: dist/*

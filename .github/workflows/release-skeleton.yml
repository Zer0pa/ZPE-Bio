name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,validation]"
          ruff check python scripts validation
          pytest -q
          python scripts/verify_multimodal_manifest.py

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Validate Rust quality gates + parity
        env:
          PYTHONPATH: python
        working-directory: core/rust
        run: |
          cargo fmt --check
          cargo test --release
          cargo clippy --release -- -D warnings
          cargo build --release
          cargo build --release --target x86_64-apple-darwin
          cd ../..
          python -m pytest -q tests/test_parity.py -rs

  build-and-attest:
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          rm -rf dist build
          python -m build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust release library
        working-directory: core/rust
        run: cargo build --release

      - name: Create integrity manifest
        run: |
          mkdir -p validation/results
          sha256sum dist/* > validation/results/release_integrity.sha256
          if ls core/rust/target/release/libzpe_bio_codec.* >/dev/null 2>&1; then
            sha256sum core/rust/target/release/libzpe_bio_codec.* >> validation/results/release_integrity.sha256
          fi

      - name: Upload release payload
        uses: actions/upload-artifact@v4
        with:
          name: zpe-bio-release-bundle
          path: |
            dist/*
            validation/results/release_integrity.sha256

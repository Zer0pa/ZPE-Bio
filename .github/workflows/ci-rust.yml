name: CI Rust

on:
  push:
    paths:
      - "core/rust/**"
      - "tests/test_parity.py"
      - "pyproject.toml"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    paths:
      - "core/rust/**"
      - "tests/test_parity.py"
      - "pyproject.toml"
      - ".github/workflows/ci-rust.yml"

permissions:
  contents: read

jobs:
  rust-quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust fmt
        working-directory: core/rust
        run: cargo fmt --check

      - name: Rust tests
        working-directory: core/rust
        run: cargo test --release

      - name: Rust clippy
        working-directory: core/rust
        run: cargo clippy --release -- -D warnings

      - name: Build cdylib for parity
        working-directory: core/rust
        run: cargo build --release

      - name: Add macOS x86_64 target
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      - name: Build macOS x86_64 cdylib for parity
        if: runner.os == 'macOS'
        working-directory: core/rust
        run: cargo build --release --target x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Python/Rust parity
        run: |
          out="$(pytest -q tests/test_parity.py -rs)"
          echo "$out"
          if echo "$out" | grep -qi "skipped"; then
            echo "Parity test was skipped."
            exit 1
          fi

[project]
name = "zpe-bio"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24,<2.0",
    "matplotlib>=3.7",
    "wfdb>=4.1",
    "scipy>=1.11",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "hypothesis>=6.82",
    "ruff>=0.1",
]
observe = [
    "comet-ml>=3.35",
]

[tool.setuptools.packages.find]
where = ["python"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
